name: build
on:
  push:
  workflow_dispatch:
permissions:
  contents: write   # needed to create releases
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - run: pio run
      - name: Collect binaries
        run: |
          mkdir -p out
          cp .pio/build/seeed_xiao_esp32c6/firmware.bin   out/flock-you-xiao_esp32c6-firmware.bin
          cp .pio/build/seeed_xiao_esp32c6/bootloader.bin out/flock-you-xiao_esp32c6-bootloader.bin
          cp .pio/build/seeed_xiao_esp32c6/partitions.bin out/flock-you-xiao_esp32c6-partitions.bin
          ls -la out/
      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: out/*
      - name: Create / update Release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}.
            Board: Seeed XIAO ESP32-C6 (4 MB flash, no PSRAM).
            Flash offsets: bootloader 0x0, partitions 0x8000, firmware 0x10000.
          files: out/*
          generate_release_notes: false
